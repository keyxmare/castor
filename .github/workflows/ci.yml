name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  COMPOSE_BAKE: "true"
  COMPOSE_FILES: "-f compose.yaml -f compose.ci.yaml"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crazy-max/ghaction-github-runtime@v3
      - uses: docker/setup-buildx-action@v3
      - run: cp .env.dist .env
      - name: Cache des dépendances
        uses: actions/cache@v4
        with:
          path: |
            backend/vendor
            frontend/node_modules
            frontend/.pnpm-store
          key: deps-${{ hashFiles('backend/composer.lock', 'frontend/pnpm-lock.yaml') }}
          restore-keys: deps-
      - run: make build
      - run: make install
      - run: make check

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: crazy-max/ghaction-github-runtime@v3
      - uses: docker/setup-buildx-action@v3
      - run: cp .env.dist .env
      - name: Cache des dépendances
        uses: actions/cache@v4
        with:
          path: |
            backend/vendor
            frontend/node_modules
            frontend/.pnpm-store
          key: deps-${{ hashFiles('backend/composer.lock', 'frontend/pnpm-lock.yaml') }}
          restore-keys: deps-
      - run: make build
      - run: make install
      - run: make up
      - name: Attente de la disponibilité de la stack
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost/api/health >/dev/null && curl -sf http://localhost/ >/dev/null; then
              echo "stack ready"
              exit 0
            fi
            sleep 2
          done
          echo "stack did not become ready"
          docker compose logs
          exit 1
      - run: make e2e

  audit:
    runs-on: ubuntu-latest
    env:
      COMPOSE_BAKE: ""
      COMPOSE_FILES: ""
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.dist .env
      - run: make build
      - run: make install
      - run: make audit
