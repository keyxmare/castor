# Template CI réutilisable (cf. CLAUDE.md §6).
# À copier dans .github/workflows/ci.yml du projet.
# La CI exécute exactement les mêmes cibles `make` qu'en local : même toolchain Docker,
# aucun écart possible entre poste de dev et CI.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build stack
        run: make build

      - name: Install dependencies
        run: make install

      # Gates bloquants, ordre CLAUDE.md §6 : format -> lint -> analyse statique -> typecheck -> tests.
      - name: Format (php-cs-fixer)
        run: make cs

      - name: Static analysis (PHPStan niveau 8)
        run: make stan

      - name: Lint front (ESLint)
        run: make front-lint

      - name: Typecheck front (vue-tsc)
        run: make front-typecheck

      - name: Tests (PHPUnit + Vitest)
        run: make php-test front-test
