name: castor

services:
  nginx:
    image: nginx:1.30-alpine
    volumes:
      - ./backend:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=PathPrefix(`/api`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.routers.api.priority=100
      - traefik.http.services.api.loadbalancer.server.port=80

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-change_me_in_local_env}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@database:5432/${POSTGRES_DB:-app}?serverVersion=18&charset=utf8
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      database:
        condition: service_healthy

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
      target: dev
    working_dir: /app
    ports:
      - "80:3000"
    volumes:
      - ./frontend:/app
    environment:
      NUXT_PUBLIC_API_BASE: /api
      NUXT_INTERNAL_API_BASE: http://nginx/api
      NUXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
      NODE_ENV: development
    command: sh -lc "pnpm install && pnpm dev --host 0.0.0.0"
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=PathPrefix(`/`)
      - traefik.http.routers.web.entrypoints=web
      - traefik.http.services.web.loadbalancer.server.port=3000

  playwright:
    build:
      context: .
      dockerfile: docker/playwright/Dockerfile
    profiles: ["e2e"]
    working_dir: /app
    environment:
      E2E_BASE_URL: http://node:3000
      CI: "1"
    command: sh -lc "pnpm exec wait-on -t 120000 http://node:3000/api/health http://node:3000/ && pnpm exec playwright test"
    depends_on:
      - nginx
      - node

  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
